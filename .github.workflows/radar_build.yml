name: Generate Wildlife JSON Dashboards

on:
  repository_dispatch:
    types: [update_radar]
  
  workflow_dispatch: 
  
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Wildlife Radar Script
        run: python Wildlife_Radar.py

      - name: Commit and Push JSON files
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add landing_data.json dashboard_data.json
          git commit -m "Auto-generated JSON payloads from Google Sheets" || echo "No changes to commit"
          git push
